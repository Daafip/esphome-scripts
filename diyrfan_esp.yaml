# ============================================================================
# DIYR Fan Firmware — ESPHome (offline build)
# Direct port of the Arduino code: global FanState + two duty levels.
# No fan abstraction. Matches the original sketch's structure exactly.
# ============================================================================

esphome:
  name: diyr-fan
  comment: "DIYR Fan — direct duty control, mirrors Arduino sketch"
  on_boot:
    priority: -100
    then:
    - script.execute: apply_fan_state

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
  variant: ESP32S3 # optional, usually auto-detected

# Enable Home Assistant API
api:
  encryption:
    key: !secret diyfan_ota_key
ota:
  platform: esphome
  password: !secret ota_password

wifi:
  manual_ip:
    static_ip: !secret static_ip_diyfan
    gateway: !secret gateway
    subnet: !secret subnet
  networks:
  - ssid: !secret wifi_ssid_boven
    password: !secret wifi_password_boven
  - ssid: !secret wifi_ssid
    password: !secret wifi_password

  ## Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${devicename} Fallback Hotspot"
    password: !secret wifi_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

logger:
  baud_rate: 115200
  level: DEBUG

# ----------------------------------------------------------------------------
# Globals.
#   fan_state:     0 = off, 1 = on
#   fan_direction: 0 = CCW (LPWM active), 1 = CW (RPWM active)
# ----------------------------------------------------------------------------
globals:
- id: fan_state
  type: int
  restore_value: no
  initial_value: '1'
- id: fan_direction
  type: int
  restore_value: no
  initial_value: '1'

# ----------------------------------------------------------------------------
# PWM outputs. Hard ceiling: max_power = 0.1955 (200/1023). DO NOT raise.
# The power slider scales set_level between 0.0–1.0, which maps linearly
# within [min_power, max_power], so 100% slider = 19.55% duty at most.
# Only one output is active at a time — the other stays at 0.0 (min_power).
# ----------------------------------------------------------------------------
output:
- platform: ledc
  pin: GPIO12
  id: fan_pwm_l   # LPWM — drives CCW rotation
  frequency: "20000Hz"
  channel: 0
  max_power: 0.1955  # 200/1023 — DO NOT raise
  min_power: 0.000978 # 1/1023

- platform: ledc
  pin: GPIO13
  id: fan_pwm_r   # RPWM — drives CW rotation
  frequency: "20000Hz"
  channel: 1
  max_power: 0.1955  # 200/1023 — DO NOT raise
  min_power: 0.000978 # 1/1023

# ----------------------------------------------------------------------------
# Power slider — 0–100%, stored as 0.0–1.0 float passed to set_level.
# Applies immediately if the fan is already on.
# ----------------------------------------------------------------------------
number:
- platform: template
  name: "Fan Power"
  id: fan_power
  min_value: 0
  max_value: 100
  step: 1
  unit_of_measurement: "%"
  optimistic: true
  initial_value: 100
  on_value:
    then:
    - script.execute: apply_fan_state

# ----------------------------------------------------------------------------
# Fan on/off switch — replaces the toggle button. Tracks fan_state so HA
# reflects the true state (including physical button presses).
# ----------------------------------------------------------------------------
switch:
- platform: template
  name: "Fan"
  id: fan_switch
  lambda: 'return id(fan_state) == 1;'
  turn_on_action:
    then:
    - lambda: 'id(fan_state) = 1;'
    - script.execute: apply_fan_state
  turn_off_action:
    then:
    - lambda: 'id(fan_state) = 0;'
    - script.execute: apply_fan_state

# ----------------------------------------------------------------------------
# Direction toggle button — blocked while fan is on.
# ----------------------------------------------------------------------------
button:
- platform: template
  name: "Fan Direction Toggle"
  on_press:
    then:
    - script.execute: toggle_direction

# ----------------------------------------------------------------------------
# Touch hub.
# ----------------------------------------------------------------------------
esp32_touch:
  setup_mode: false
  measurement_duration: 0.25ms
  sleep_duration: 0.5ms

# ----------------------------------------------------------------------------
# Inputs. Boot button syncs through the switch turn_on/off actions.
# ----------------------------------------------------------------------------
binary_sensor:
# - platform: esp32_touch
#   name: "Heatsink Touch"
#   id: heatsink_touch
#   pin: GPIO1
#   threshold: 1500000
#   on_state:
#     then:
#     - logger.log:
#         format: "Heatsink touch state=%s (threshold=%d, value=%d)"
#         args: [ 'x ? "ON" : "OFF"', '35', 'id(heatsink_touch).get_value()' ]
#   filters:
#   - delayed_on: 50ms
#   on_press:
#     then:
#     - script.execute: toggle_fan

- platform: gpio
  name: "Boot Button"
  id: boot_button
  pin:
    number: GPIO0
    mode:
      input: true
      pullup: true
    inverted: true
  filters:
  - delayed_on: 20ms
  on_press:
    then:
    - script.execute: toggle_fan

# ----------------------------------------------------------------------------
# Scripts.
#
# apply_fan_state — drives outputs based on fan_state, fan_direction, and
#   the fan_power slider. set_level receives power/100 so 100% = max_power.
#
# toggle_fan      — flips fan_state, updates the HA switch, then applies.
# toggle_direction — blocked while fan is on.
# ----------------------------------------------------------------------------
script:
- id: apply_fan_state
  then:
  - if:
      condition:
        lambda: 'return id(fan_state) == 1;'
      then:
      - if:
          condition:
            lambda: 'return id(fan_direction) == 0;'
          then:
          - output.set_level:
              id: fan_pwm_l
              level: !lambda 'return id(fan_power).state / 100.0;'
          - output.set_level: {id: fan_pwm_r, level: 0.0}
          - logger.log:
              format: "Fan ON — CCW %.0f%%"
              args: [ 'id(fan_power).state' ]
          else:
          - output.set_level: {id: fan_pwm_l, level: 0.0}
          - output.set_level:
              id: fan_pwm_r
              level: !lambda 'return id(fan_power).state / 100.0;'
          - logger.log:
              format: "Fan ON — CW %.0f%%"
              args: [ 'id(fan_power).state' ]
      else:
      - output.set_level: {id: fan_pwm_l, level: 0.0}
      - output.set_level: {id: fan_pwm_r, level: 0.0}
      - logger.log: "Fan OFF"

- id: toggle_fan
  then:
  - lambda: 'id(fan_state) = (id(fan_state) + 1) % 2;'
  - script.execute: apply_fan_state

- id: toggle_direction
  then:
  - if:
      condition:
        lambda: 'return id(fan_state) == 0;'
      then:
      - lambda: 'id(fan_direction) = (id(fan_direction) + 1) % 2;'
      - logger.log:
          format: "Direction changed to %s"
          args: [ 'id(fan_direction) == 0 ? "CCW" : "CW"' ]
      else:
      - logger.log: "Direction change blocked — stop the fan first"
