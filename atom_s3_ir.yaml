substitutions:
  # easily modify variables
  hostname: "atoms3ir"
  devicename: atoms3ir

esphome:
  name: atoms3ir
  friendly_name: Atom S3 IR

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG
  # AtomS3 has no UART bridge chip; logs must go over native USB
  hardware_uart: USB_SERIAL_JTAG

# Enable Home Assistant API
api:
  encryption:
    key: !secret atoms3ir_ota_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  # manual_ip:
  # static_ip: !secret static_ip_atoms3ir
  # gateway: !secret gateway
  # subnet: !secret subnet
  networks:
  - ssid: !secret wifi_ssid_boven
    password: !secret wifi_password_boven
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  ## Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${devicename} Fallback Hotspot"
    password: !secret wifi_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
### extra device info
sensor:

- platform: wifi_signal
  name: ${devicename} wifi signal
  update_interval: 600s

time:
- platform: homeassistant
  id: homeassistant_time

# Text sensors with general information.
text_sensor:
# Expose ESPHome version as sensor.
- platform: version
  name: $devicename Version
# Expose WiFi information as sensors.
- platform: wifi_info
  ip_address:
    name: $devicename IP
  bssid:
    name: $devicename BSSID

light:
- platform: fastled_clockless
  chipset: WS2812B
  pin: GPIO35
  num_leds: 4
  rgb_order: GRB
  id: led
  name: "${devicename} LED"
  restore_mode: RESTORE_DEFAULT_OFF
  effects:
  - pulse:
      name: "Pulse"
      transition_length: 1s
      update_interval: 1s
  - strobe:
      name: "Strobe"
  - random:
      name: "Random"
      transition_length: 5s
      update_interval: 3s

remote_receiver:
  pin: GPIO1 # RX-pin van de unit
  dump: all
  id: rcvr

remote_transmitter:
  pin: GPIO2 # TX-pin van de unit (Grove: G1=RX, G2=TX; GPIO21 bestaat niet op de AtomS3)
  carrier_duty_percent: 50%

